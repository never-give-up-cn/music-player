<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>
<script src="songs.js"></script>
<style>
  /* ============ Reset & Base ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.06);
    --surface-hover: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.08);
    --text: #eee;
    --text-dim: rgba(255,255,255,0.45);
    --primary: #a78bfa;
    --primary-glow: rgba(167,139,250,0.3);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  /* ============ Background ============ */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 40%, rgba(167,139,250,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 60%, rgba(59,130,246,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 80%, rgba(236,72,153,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ============ Layout ============ */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 24px;
  }

  .player {
    width: 420px;
    max-width: 100%;
    background: var(--surface);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    transition: width 0.3s ease;
  }

  /* ============ Cover Art ============ */
  .cover {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius-sm);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .cover-icon {
    position: relative;
    z-index: 2;
    width: 64px; height: 64px;
    opacity: 0.4;
    color: #fff;
    transition: opacity 0.4s ease;
  }
  .player.playing .cover-icon {
    opacity: 0.7;
  }

  /* ============ Song Info ============ */
  .info {
    text-align: center;
    margin-bottom: 20px;
  }
  .info .title {
    font-size: 18px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .info .artist {
    font-size: 14px;
    color: var(--text-dim);
  }

  /* ============ Progress ============ */
  .progress-area {
    margin-bottom: 20px;
  }
  .progress-bar {
    position: relative;
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    cursor: pointer;
    touch-action: none;
  }
  .progress-bar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #a78bfa, #7c3aed);
    border-radius: 3px;
    position: relative;
    transition: width 0.1s linear;
  }
  .progress-bar .thumb {
    position: absolute;
    right: -8px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .progress-bar:hover .thumb,
  .progress-bar.dragging .thumb { opacity: 1; }
  .progress-bar.dragging .fill { transition: none; }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* ============ Controls ============ */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .controls button {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    position: relative;
  }
  .controls button:active { transform: scale(0.92); }

  .btn-prev, .btn-next {
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 18px;
  }
  .btn-prev:hover, .btn-next:hover {
    background: var(--surface-hover);
  }

  .btn-play {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary);
    font-size: 24px;
    box-shadow: 0 0 24px var(--primary-glow);
  }
  .btn-play:hover {
    background: #8b74e0;
    box-shadow: 0 0 32px var(--primary-glow);
  }

  /* ============ Bottom Row ============ */
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .mode-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 6px 8px;
    border-radius: 6px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .mode-btn:hover { color: var(--text); background: var(--surface-hover); }
  .mode-btn.active { color: var(--primary); }

  .mode-label {
    font-size: 11px;
    font-weight: 500;
  }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .volume-wrap .icon {
    font-size: 18px;
    color: var(--text-dim);
    cursor: pointer;
    width: 28px; height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    transition: 0.15s;
  }
  .volume-wrap .icon:hover { background: var(--surface-hover); }
  .volume-bar {
    width: 80px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    touch-action: none;
  }
  .volume-bar .fill {
    height: 100%;
    width: 80%;
    background: var(--text);
    border-radius: 2px;
    transition: width 0.1s;
  }
  .volume-bar .thumb {
    position: absolute;
    right: -7px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .volume-bar:hover .thumb,
  .volume-bar.dragging .thumb { opacity: 1; }

  /* ============ Playlist Toggle ============ */
  .playlist-toggle {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
    padding: 6px 10px;
    border-radius: 6px;
    transition: 0.15s;
    display: flex;
    align-items: center;
  }
  .playlist-toggle:hover { color: var(--text); background: var(--surface-hover); }
  .playlist-toggle.active { color: var(--primary); }

  /* ============ Playlist Panel ============ */
  .playlist {
    width: 320px;
    max-width: 100%;
    height: 560px;
    max-height: calc(100vh - 48px);
    background: var(--surface);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .playlist.hidden {
    width: 0;
    min-width: 0;
    padding: 0;
    border: none;
    overflow: hidden;
    opacity: 0;
    margin: 0;
    pointer-events: none;
  }
  .playlist-header {
    padding: 20px 20px 12px;
    font-size: 15px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .playlist-header .count {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
  }
  .playlist-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .playlist-list::-webkit-scrollbar {
    width: 4px;
  }
  .playlist-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .playlist-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
  }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .playlist-item:hover {
    background: var(--surface-hover);
  }
  .playlist-item.active {
    background: rgba(167,139,250,0.12);
  }
  .playlist-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 3px;
    background: var(--primary);
    border-radius: 0 2px 2px 0;
  }

  .playlist-item .idx {
    width: 24px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    flex-shrink: 0;
  }
  .playlist-item.active .idx { color: var(--primary); }

  .playlist-item .item-info {
    flex: 1;
    min-width: 0;
  }
  .playlist-item .item-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .playlist-item.active .item-title { color: var(--primary); }
  .playlist-item .item-artist {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .playlist-item .playing-indicator {
    display: none;
    width: 16px; height: 16px;
    flex-shrink: 0;
    color: var(--primary);
  }
  .playlist-item.active .playing-indicator {
    display: block;
  }
  .playlist-item .play-icon {
    display: none;
    width: 16px; height: 16px;
    flex-shrink: 0;
    color: var(--primary);
  }
  .playlist-item.active.current .play-icon { display: block; }
  .playlist-item.active.current .idx { display: none; }

  /* ============ Toast / Error ============ */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(239,68,68,0.9);
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    color: #fff;
    pointer-events: none;
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ============ Responsive ============ */
  @media (max-width: 820px) {
    .app { flex-direction: column; padding: 16px; gap: 16px; }
    .player { width: 100%; padding: 24px; }
    .playlist {
      width: 100%;
      height: 240px;
      max-height: 40vh;
    }
    .playlist.hidden { display: none; }
  }

  @media (max-width: 480px) {
    .player { padding: 20px; }
    .controls { gap: 16px; }
    .btn-play { width: 48px; height: 48px; font-size: 20px; }
    .volume-bar { width: 56px; }
    .playlist { height: 180px; }
  }

  /* ============ Viper / 蝰蛇音效 ============ */
  .viper-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 18px; padding: 6px 10px; border-radius: 6px; transition: 0.15s;
    display: flex; align-items: center;
  }
  .viper-btn:hover { color: #f0b429; background: var(--surface-hover); }
  .viper-btn.active { color: #f0b429; }

  .viper-panel {
    width: 620px; max-width: calc(100vw - 48px); max-height: calc(100vh - 48px);
    background: #0d0d12;
    border: 1px solid rgba(240,180,41,0.2);
    border-radius: var(--radius);
    box-shadow: 0 8px 60px rgba(0,0,0,0.7), 0 0 80px rgba(240,180,41,0.05);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    transition: all 0.3s ease;
  }
  .viper-panel.hidden {
    width: 0; min-width: 0; padding: 0; border: none;
    overflow: hidden; opacity: 0; margin: 0; pointer-events: none;
  }

  .viper-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: linear-gradient(135deg, #0d0d12 0%, #1a1508 100%);
    border-bottom: 1px solid rgba(240,180,41,0.15);
  }
  .viper-logo { display: flex; align-items: center; gap: 6px; color: #f0b429; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
  .viper-logo svg { color: #f0b429; }
  .viper-current { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-dim); }
  .viper-effect-name { color: #f0b429; font-weight: 600; font-size: 14px; }

  .viper-switch { position: relative; width: 36px; height: 20px; cursor: pointer; display: inline-block; }
  .viper-switch input { display: none; }
  .viper-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.12); border-radius: 10px; transition: 0.25s; }
  .viper-slider::before {
    content: ''; position: absolute; width: 16px; height: 16px;
    left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: 0.25s;
  }
  .viper-switch input:checked + .viper-slider { background: #f0b429; }
  .viper-switch input:checked + .viper-slider::before { transform: translateX(16px); }

  .viper-recent { background: none; border: 1px solid rgba(240,180,41,0.3); color: #f0b429; font-size: 12px; padding: 4px 12px; border-radius: 14px; cursor: pointer; transition: 0.15s; }
  .viper-recent:hover { background: rgba(240,180,41,0.1); border-color: #f0b429; }

  .viper-body { display: flex; flex: 1; overflow: hidden; }
  .viper-nav { width: 90px; flex-shrink: 0; padding: 12px 0; border-right: 1px solid rgba(255,255,255,0.05); }
  .viper-nav-item {
    padding: 10px 14px; font-size: 12px; color: var(--text-dim); cursor: pointer;
    transition: 0.15s; border-right: 2px solid transparent;
  }
  .viper-nav-item:hover { color: var(--text); }
  .viper-nav-item.active { color: #f0b429; border-right-color: #f0b429; background: rgba(240,180,41,0.05); }

  .viper-content { flex: 1; padding: 14px; overflow-y: auto; }
  .viper-content::-webkit-scrollbar { width: 4px; }
  .viper-content::-webkit-scrollbar-thumb { background: rgba(240,180,41,0.25); border-radius: 2px; }

  .viper-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .viper-card {
    position: relative; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
    padding: 12px 6px; text-align: center; cursor: pointer; transition: all 0.2s;
    min-height: 76px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
  }
  .viper-card:hover { background: rgba(240,180,41,0.08); border-color: rgba(240,180,41,0.3); transform: translateY(-1px); }
  .viper-card.active { border-color: #f0b429; background: rgba(240,180,41,0.12); box-shadow: 0 0 20px rgba(240,180,41,0.1); }
  .viper-card-icon { font-size: 22px; line-height: 1; }
  .viper-card-name { font-size: 11px; color: var(--text); font-weight: 500; line-height: 1.2; }
  .viper-card-badge { position: absolute; top: 4px; right: 4px; font-size: 8px; padding: 1px 5px; border-radius: 6px; background: linear-gradient(135deg, #f0b429, #d4890a); color: #000; font-weight: 700; }
  .viper-card-tag { position: absolute; top: 4px; right: 4px; font-size: 8px; padding: 1px 5px; border-radius: 6px; background: rgba(240,180,41,0.15); color: #f0b429; border: 1px solid rgba(240,180,41,0.3); }

  .viper-eq { margin-top: 12px; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(240,180,41,0.08); }
  .viper-eq-vis { display: flex; align-items: flex-end; gap: 3px; height: 40px; padding: 0 2px; }
  .viper-eq-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s, background 0.3s; }
  .viper-eq-labels { display: flex; gap: 3px; margin-top: 4px; }
  .viper-eq-labels span { flex: 1; text-align: center; font-size: 8px; color: var(--text-dim); }
  .viper-eq-slider { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
  .viper-eq-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #f0b429; cursor: pointer; box-shadow: 0 0 10px rgba(240,180,41,0.3); }

  .viper-filter { display: flex; align-items: center; gap: 6px; padding: 10px 18px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); flex-wrap: wrap; }
  .viper-filter-label { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
  .viper-filter-chip { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim); font-size: 11px; padding: 3px 12px; border-radius: 12px; cursor: pointer; transition: 0.15s; }
  .viper-filter-chip:hover { border-color: #f0b429; color: #f0b429; }
  .viper-filter-chip.active { background: rgba(240,180,41,0.15); border-color: #f0b429; color: #f0b429; }

  @media (max-width: 820px) {
    .viper-panel { width: 100%; max-height: 50vh; }
    .viper-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 480px) {
    .viper-grid { grid-template-columns: repeat(2, 1fr); }
    .viper-nav { width: 70px; }
    .viper-nav-item { padding: 8px 10px; font-size: 11px; }
  }

  /* ============ SVG icons inline ============ */
  .icon-svg { width: 100%; height: 100%; fill: currentColor; }
</style>
</head>
<body>

<div class="app">
  <!-- Player -->
  <div class="player" id="player">
    <div class="cover" id="cover">
      <canvas id="coverCanvas"></canvas>
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>

    <div class="info">
      <div class="title" id="songTitle">选择歌曲</div>
      <div class="artist" id="songArtist">等待播放</div>
    </div>

    <div class="progress-area">
      <div class="progress-bar" id="progressBar">
        <div class="fill" id="progressFill"><div class="thumb"></div></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn-prev" id="btnPrev" title="上一首 (←)" aria-label="上一首">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="btn-play" id="btnPlay" title="播放/暂停 (Space)" aria-label="播放">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="btn-next" id="btnNext" title="下一首 (→)" aria-label="下一首">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-3.5 6l-8.5-6v12z"/></svg>
      </button>
    </div>

    <div class="bottom-row">
      <div style="display:flex;align-items:center;gap:4px">
        <button class="mode-btn" id="btnMode" title="播放模式" aria-label="播放模式">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="modeIcon">
            <polyline points="4 7 9 12 4 17"/>
            <path d="M20 7h-7a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h7"/>
          </svg>
          <span class="mode-label" id="modeLabel">顺序</span>
        </button>
      </div>
      <div class="volume-wrap">
        <span class="icon" id="btnMute" title="静音" aria-label="静音">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="volIcon">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </span>
        <div class="volume-bar" id="volumeBar">
          <div class="fill" id="volumeFill"><div class="thumb"></div></div>
        </div>
      </div>
      <button class="playlist-toggle" id="playlistToggle" title="播放列表" aria-label="播放列表">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<audio id="audio" preload="auto"></audio>

<script>
(function() {
  'use strict';

  // ============ DOM refs ============
  const audio = document.getElementById('audio');
  const player = document.getElementById('player');
  const cover = document.getElementById('cover');
  const canvas = document.getElementById('coverCanvas');
  const ctx = canvas.getContext('2d');

  const songTitle = document.getElementById('songTitle');
  const songArtist = document.getElementById('songArtist');

  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');

  const btnPlay = document.getElementById('btnPlay');
  const playIcon = document.getElementById('playIcon');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  const btnMode = document.getElementById('btnMode');
  const modeIcon = document.getElementById('modeIcon');
  const modeLabel = document.getElementById('modeLabel');

  const volumeBar = document.getElementById('volumeBar');
  const volumeFill = document.getElementById('volumeFill');
  const btnMute = document.getElementById('btnMute');
  const volIcon = document.getElementById('volIcon');

  const playlist = document.getElementById('playlist');
  const playlistToggle = document.getElementById('playlistToggle');
  const playlistList = document.getElementById('playlistList');
  const songCount = document.getElementById('songCount');

  const toast = document.getElementById('toast');

  // ============ State ============
  const songs = window.SONGS || [];
  let currentIndex = 0;
  let isPlaying = false;
  let mode = 'sequence'; // 'sequence' | 'repeat' | 'shuffle'
  let volume = 0.8;
  let prevVolume = volume;
  let isMuted = false;
  let isDraggingProgress = false;
  let isDraggingVolume = false;
  let playlistVisible = true;

  // ============ Init canvas size ============
  function resizeCanvas() {
    const rect = cover.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const w = rect.width;
    const h = rect.height;
    if (w > 0 && h > 0) {
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);
      drawCover(currentIndex);
    }
  }

  // ============ Cover art ============
  function drawCover(index) {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    if (w === 0 || h === 0) return;

    // Generate palette from index
    const hue1 = (index * 47) % 360;
    const hue2 = (hue1 + 40 + (index * 13) % 60) % 360;
    const hue3 = (hue1 + 80 + (index * 7) % 40) % 360;

    ctx.clearRect(0, 0, w, h);

    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, `hsl(${hue1}, 50%, 20%)`);
    grad.addColorStop(0.5, `hsl(${hue2}, 45%, 15%)`);
    grad.addColorStop(1, `hsl(${hue3}, 55%, 10%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Subtle pattern
    for (let i = 0; i < 6; i++) {
      const cx = w * (0.15 + Math.sin(index * 1.7 + i * 1.1) * 0.35);
      const cy = h * (0.15 + Math.cos(index * 2.3 + i * 0.9) * 0.35);
      const r = w * (0.12 + Math.sin(index + i) * 0.04);
      const c = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      c.addColorStop(0, `hsla(${(hue1 + i * 30) % 360}, 40%, 50%, 0.15)`);
      c.addColorStop(1, `hsla(${(hue1 + i * 30) % 360}, 40%, 50%, 0)`);
      ctx.fillStyle = c;
      ctx.fillRect(0, 0, w, h);
    }
  }

  // ============ Time formatting ============
  function fmtTime(s) {
    if (!isFinite(s) || s < 0) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // ============ Load song ============
  function loadSong(index) {
    if (!songs.length || index < 0 || index >= songs.length) return;
    currentIndex = index;

    const song = songs[index];
    audio.src = song.file;
    songTitle.textContent = song.title;
    songArtist.textContent = song.artist;
    drawCover(index);

    // Update playlist
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });

    if (isPlaying) {
      audio.play().catch(e => {
        if (e.name !== 'AbortError') {
          showToast('无法播放: ' + song.file);
          isPlaying = false;
          updatePlayBtn();
        }
      });
    }
  }

  // ============ Play/Pause ============
  function togglePlay() {
    if (!songs.length) return;
    const song = songs[currentIndex];
    if (!song) return;

    if (audio.src && audio.src !== location.href && !audio.src.endsWith('/')) {
      if (audio.paused) {
        audio.play().catch(e => {
          showToast('无法播放: ' + song.file + ' — 文件可能不存在');
          isPlaying = false;
          updatePlayBtn();
        });
      } else {
        audio.pause();
      }
    } else {
      loadSong(currentIndex);
    }
  }

  function updatePlayBtn() {
    if (isPlaying) {
      playIcon.innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';
      player.classList.add('playing');
    } else {
      playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      player.classList.remove('playing');
    }
  }

  // ============ Next / Prev ============
  function nextSong() {
    if (!songs.length) return;
    if (mode === 'shuffle') {
      let next;
      do { next = Math.floor(Math.random() * songs.length); } while (next === currentIndex && songs.length > 1);
      currentIndex = next;
    } else {
      currentIndex = (currentIndex + 1) % songs.length;
    }
    loadSong(currentIndex);
  }

  function prevSong() {
    if (!songs.length) return;
    // If more than 3s into song, restart
    if (audio.currentTime > 3) {
      audio.currentTime = 0;
      return;
    }
    if (mode === 'shuffle') {
      let prev;
      do { prev = Math.floor(Math.random() * songs.length); } while (prev === currentIndex && songs.length > 1);
      currentIndex = prev;
    } else {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    }
    loadSong(currentIndex);
  }

  // ============ Mode ============
  function cycleMode() {
    if (mode === 'sequence') {
      mode = 'repeat';
      modeIcon.innerHTML = '<path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>';
      modeLabel.textContent = '单曲';
    } else if (mode === 'repeat') {
      mode = 'shuffle';
      modeIcon.innerHTML = '<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>';
      modeLabel.textContent = '随机';
    } else {
      mode = 'sequence';
      modeIcon.innerHTML = '<polyline points="4 7 9 12 4 17"/><path d="M20 7h-7a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h7"/>';
      modeLabel.textContent = '顺序';
    }
  }

  // ============ Volume ============
  function setVolume(val) {
    volume = Math.max(0, Math.min(1, val));
    audio.volume = volume;
    volumeFill.style.width = (volume * 100) + '%';
    isMuted = volume === 0;
    updateVolIcon();
  }

  function toggleMute() {
    if (isMuted) {
      setVolume(prevVolume || 0.8);
      isMuted = false;
    } else {
      prevVolume = volume;
      setVolume(0);
      isMuted = true;
    }
  }

  function updateVolIcon() {
    if (isMuted || volume === 0) {
      volIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
    } else if (volume < 0.5) {
      volIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    } else {
      volIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    }
  }

  // ============ Progress bar drag ============
  function updateProgress(clientX) {
    const rect = progressBar.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    if (audio.duration && isFinite(audio.duration)) {
      audio.currentTime = pct * audio.duration;
    }
  }

  function updateVolumeFromEvent(clientX) {
    const rect = volumeBar.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    setVolume(pct);
  }

  // ============ Toast ============
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
  }

  // ============ Build playlist ============
  function buildPlaylist() {
    playlistList.innerHTML = '';
    songs.forEach((song, i) => {
      const item = document.createElement('div');
      item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
      item.dataset.index = i;

      item.innerHTML = `
        <span class="idx">${i + 1}</span>
        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <div class="item-info">
          <div class="item-title">${song.title}</div>
          <div class="item-artist">${song.artist}</div>
        </div>
        <svg class="playing-indicator" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="10" width="3" height="8" rx="1.5"><animate attributeName="height" values="8;14;8" dur="0.8s" repeatCount="indefinite"/></rect>
          <rect x="10.5" y="6" width="3" height="16" rx="1.5"><animate attributeName="height" values="16;10;16" dur="0.6s" repeatCount="indefinite"/></rect>
          <rect x="17" y="8" width="3" height="12" rx="1.5"><animate attributeName="height" values="12;16;12" dur="0.7s" repeatCount="indefinite"/></rect>
        </svg>
      `;

      item.addEventListener('click', () => {
        if (i !== currentIndex) {
          loadSong(i);
        } else if (audio.paused) {
          togglePlay();
        }
      });

      playlistList.appendChild(item);
    });
    songCount.textContent = songs.length + ' 首';
  }

  // ============ Toggle playlist ============
  function togglePlaylist() {
    playlistVisible = !playlistVisible;
    playlist.classList.toggle('hidden', !playlistVisible);
    playlistToggle.classList.toggle('active', playlistVisible);
  }

  // ============ Keyboard ============
  function onKey(e) {
    // Don't interfere with typing in inputs (none on this page, but safe)
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch (e.key) {
      case ' ':
        e.preventDefault();
        togglePlay();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        audio.currentTime = Math.max(0, audio.currentTime - 5);
        break;
      case 'ArrowRight':
        e.preventDefault();
        audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
        break;
      case 'ArrowUp':
        e.preventDefault();
        setVolume(Math.min(1, volume + 0.05));
        break;
      case 'ArrowDown':
        e.preventDefault();
        setVolume(Math.max(0, volume - 0.05));
        break;
    }
  }

  // ============ Event Listeners ============

  // Audio events
  audio.addEventListener('play', () => {
    isPlaying = true;
    updatePlayBtn();
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('current', i === currentIndex);
    });
  });

  audio.addEventListener('pause', () => {
    isPlaying = false;
    updatePlayBtn();
  });

  audio.addEventListener('ended', () => {
    if (mode === 'repeat') {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    } else {
      nextSong();
    }
  });

  audio.addEventListener('timeupdate', () => {
    if (!isDraggingProgress) {
      const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
      progressFill.style.width = pct + '%';
    }
    currentTimeEl.textContent = fmtTime(audio.currentTime);
    totalTimeEl.textContent = fmtTime(audio.duration);
  });

  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = fmtTime(audio.duration);
  });

  audio.addEventListener('error', () => {
    if (audio.src && !audio.src.endsWith('/')) {
      showToast('加载失败: ' + (songs[currentIndex]?.file || '未知文件'));
    }
  });

  // Play button
  btnPlay.addEventListener('click', togglePlay);

  // Prev / Next
  btnPrev.addEventListener('click', prevSong);
  btnNext.addEventListener('click', nextSong);

  // Mode
  btnMode.addEventListener('click', cycleMode);

  // Progress bar
  progressBar.addEventListener('mousedown', (e) => {
    isDraggingProgress = true;
    progressBar.classList.add('dragging');
    updateProgress(e.clientX);

    const onMove = (ev) => updateProgress(ev.clientX);
    const onUp = () => {
      isDraggingProgress = false;
      progressBar.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Touch progress
  progressBar.addEventListener('touchstart', (e) => {
    isDraggingProgress = true;
    progressBar.classList.add('dragging');
    updateProgress(e.touches[0].clientX);
  }, {passive: true});
  progressBar.addEventListener('touchmove', (e) => {
    updateProgress(e.touches[0].clientX);
  }, {passive: true});
  progressBar.addEventListener('touchend', () => {
    isDraggingProgress = false;
    progressBar.classList.remove('dragging');
  });
  progressBar.addEventListener('touchcancel', () => {
    isDraggingProgress = false;
    progressBar.classList.remove('dragging');
  });

  // Volume bar
  volumeBar.addEventListener('mousedown', (e) => {
    isDraggingVolume = true;
    volumeBar.classList.add('dragging');
    updateVolumeFromEvent(e.clientX);

    const onMove = (ev) => updateVolumeFromEvent(ev.clientX);
    const onUp = () => {
      isDraggingVolume = false;
      volumeBar.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  volumeBar.addEventListener('touchstart', (e) => {
    volumeBar.classList.add('dragging');
    updateVolumeFromEvent(e.touches[0].clientX);
  }, {passive: true});
  volumeBar.addEventListener('touchmove', (e) => {
    updateVolumeFromEvent(e.touches[0].clientX);
  }, {passive: true});
  volumeBar.addEventListener('touchend', () => {
    volumeBar.classList.remove('dragging');
  });
  volumeBar.addEventListener('touchcancel', () => {
    volumeBar.classList.remove('dragging');
  });

  // Mute
  btnMute.addEventListener('click', toggleMute);

  // Playlist toggle
  playlistToggle.addEventListener('click', togglePlaylist);

  // Keyboard
  document.addEventListener('keydown', onKey);

  // Resize
  window.addEventListener('resize', () => {
    resizeCanvas();
  });

  // ============ 蝰蛇音效 ============
  // Web Audio API state
  let audioCtx = null;
  let sourceNode = null;
  let bypassGain = null;    // always between sourceNode and dest/effects
  let currentNodes = [];
  let viperEnabled = false;
  let viperEffect = '3dSurround';
  let viperIntensity = 60;
  const viperPanel = document.getElementById('viperPanel');
  const viperBtn = document.getElementById('viperBtn');
  const viperToggle = document.getElementById('viperToggle');
  const viperEffectName = document.getElementById('viperEffectName');
  const viperGrid = document.getElementById('viperGrid');
  const viperEqSlider = document.getElementById('viperEqSlider') || {value: 60};

  const EFFECT_NAMES = {
    blackDiamond: '黑钻蝰蛇', '3dSurround': '3D 丽音', surround: '环绕丽音',
    hifi: 'HiFi 现场', '3dRotate': '3D 环绕', concert: '演唱会',
    chinese: '声乐古风', vocal: '纯净人声', surround51: '5.1 全景',
    spiral: '3D 旋转', bass: '超重低音', crystal: '清澈人声',
    electronic: '电子乐', jazz: '爵士', classical: '古典',
    rock: '摇滚', pop: '流行', rnb: 'R&B', dance: '舞曲', folk: '民谣'
  };

  function initAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      try {
        sourceNode = audioCtx.createMediaElementSource(audio);
        bypassGain = audioCtx.createGain();
        bypassGain.gain.value = 1;
        sourceNode.connect(bypassGain);
        bypassGain.connect(audioCtx.destination);
      } catch(e) { console.log('Audio init error:', e); }
    }
  }

  function resumeAudioCtx() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(e => console.log('Resume error:', e));
    }
  }

  // 10-band EQ preset system

  function setEQActive(active) {
    if (!audioCtx || !bypassGain) return;
    try { bypassGain.disconnect(); } catch(e) {}
    currentNodes.forEach(n => { try { n.disconnect(); } catch(e) {} });
    currentNodes = [];
    if (!active) {
      bypassGain.connect(audioCtx.destination);
      return;
    }
    const preset = VIPER_PRESETS[viperEffect] || VIPER_PRESETS['3dSurround'];
    const intensity = viperIntensity / 100;
    const chain = [];
    for (let i = 0; i < EQ_BANDS.length; i++) {
      const f = audioCtx.createBiquadFilter();
      f.type = 'peaking';
      f.frequency.value = EQ_BANDS[i];
      f.Q.value = 0.7 + (i * 0.05);
      f.gain.value = (preset[i] || 0) * intensity;
      chain.push(f);
    }
    const outGain = audioCtx.createGain();
    outGain.gain.value = 0.85;
    chain.push(outGain);
    currentNodes = chain;
    bypassGain.connect(chain[0]);
    for (let i = 1; i < chain.length; i++) chain[i-1].connect(chain[i]);
    chain[chain.length-1].connect(audioCtx.destination);
  }

  // 10-band EQ preset system
  const EQ_BANDS = [32, 64, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

  const VIPER_PRESETS = {
    // effectId: [gains for bands 32Hz..16kHz] (dB, -18 to +18)
    blackDiamond: [8, 6, 3, 0, 1, 2, 4, 6, 8, 10],  // 黑钻: V-shape + highs
    '3dSurround': [2, 1, 0, -1, -1, 0, 2, 4, 6, 8],   // 3D丽音: presence boost
    surround: [0, -1, -2, -2, 0, 2, 3, 5, 7, 9],      // 环绕丽音: wide + airy
    hifi: [3, 3, 2, 1, 1, 2, 3, 4, 5, 6],            // HiFi现场: balanced lift
    '3dRotate': [4, 3, 1, -1, -2, 0, 3, 5, 7, 8],    // 3D环绕: spatial
    concert: [2, 2, 1, 1, 2, 3, 4, 5, 6, 7],         // 演唱会: warm hall
    chinese: [-2, -1, 1, 3, 4, 3, 2, 1, 0, -1],      // 声乐古风: mid-centric
    vocal: [-6, -4, -2, 0, 2, 5, 6, 4, 2, 1],        // 纯净人声: mid boost
    surround51: [0, 0, -1, -1, 0, 2, 4, 6, 8, 10],   // 5.1全景: surround
    spiral: [3, 2, 0, -1, -1, 0, 2, 4, 6, 8],        // 3D旋转: dynamic
    bass: [12, 12, 8, 4, 2, 0, -2, -4, -6, -8],      // 超重低音: heavy lows
    crystal: [-2, 0, 2, 3, 4, 5, 6, 7, 8, 9],        // 清澈人声: bright
    electronic: [8, 6, 4, 2, 1, 2, 4, 6, 8, 10],     // 电子乐: punchy
    jazz: [4, 3, 2, 1, 2, 3, 4, 5, 4, 3],            // 爵士: warm
    classical: [2, 2, 3, 3, 3, 4, 5, 6, 7, 8],       // 古典: full range
    rock: [6, 5, 4, 3, 2, 3, 4, 5, 6, 6],            // 摇滚: aggressive
    pop: [4, 4, 3, 2, 2, 3, 4, 5, 6, 7],             // 流行: bright
    rnb: [8, 7, 5, 3, 2, 3, 4, 5, 6, 6],             // R&B: bass heavy
    dance: [10, 8, 6, 4, 3, 3, 4, 6, 8, 10],         // 舞曲: energetic
    folk: [2, 2, 3, 4, 4, 3, 2, 2, 1, 1]             // 民谣: warm acoustic
  };

  let eqFilters = [];  // the 10 EQ filter nodes (created once)

  function buildEQChain() {
    // Build 10-band graphic EQ: bypassGain → band1 → band2 → ... → band10 → destination
    const filters = [];
    for (let i = 0; i < EQ_BANDS.length; i++) {
      const f = audioCtx.createBiquadFilter();
      f.type = 'peaking';
      f.frequency.value = EQ_BANDS[i];
      f.Q.value = 0.7 + (i * 0.05);  // wider Q for low freqs, narrower for high
      f.gain.value = 0;
      filters.push(f);
    }
    return filters;
  }

  // ===== 使用 setEQActive(active) 替代 setupAudioGraph() =====

  function applyEffect(effectId, intensity) {
    viperEffect = effectId || '3dSurround';
    viperIntensity = intensity !== undefined ? intensity : viperIntensity;
    viperEffectName.textContent = EFFECT_NAMES[viperEffect] || '3D 丽音';
    // Update grid active state
    document.querySelectorAll('.viper-card').forEach(el => {
      el.classList.toggle('active', el.dataset.effect === viperEffect);
    });
    // Show/hide EQ visualizer and update bars
    const eqDiv = document.getElementById('viperEq');
    eqDiv.style.display = 'block';
    const viz = document.getElementById('eqViz');
    viz.innerHTML = '';
    const preset = VIPER_PRESETS[viperEffect] || VIPER_PRESETS['3dSurround'];
    const maxGain = 12;
    for (let i = 0; i < EQ_BANDS.length; i++) {
      const bar = document.createElement('div');
      bar.className = 'viper-eq-bar';
      const gain = (preset[i] || 0) * (viperIntensity / 100);
      const pct = Math.max(3, Math.abs(gain) / maxGain * 100);
      bar.style.height = Math.min(40, pct) + 'px';
      bar.style.background = gain >= 0
        ? `linear-gradient(to top, #f0b429, #d4890a)`
        : `linear-gradient(to top, #555, #333)`;
      bar.style.opacity = Math.max(0.3, Math.abs(gain) / maxGain);
      viz.appendChild(bar);
    }
    if (viperEnabled && audioCtx) {
      setEQActive(true);
    }
  }

  // Toggle viper panel + resume audio context
  viperBtn.addEventListener('click', () => {
    const isOpen = !viperPanel.classList.contains('hidden');
    viperPanel.classList.toggle('hidden', isOpen);
    viperBtn.classList.toggle('active', !isOpen);
    resumeAudioCtx();  // Wake up AudioContext on user gesture
  });

  // Toggle viper on/off
  viperToggle.addEventListener('change', () => {
    viperEnabled = viperToggle.checked;
    initAudioCtx();
    resumeAudioCtx();
    setEQActive(viperEnabled);
  });

  // Click effect cards
  viperGrid.addEventListener('click', e => {
    const card = e.target.closest('.viper-card');
    if (!card || card.dataset.vip === 'true') return;
    const effect = card.dataset.effect;
    if (effect) {
      viperEnabled = true;
      viperToggle.checked = true;
      if (!audioCtx) initAudioCtx();
      applyEffect(effect);
    }
  });

  // EQ slider
  viperEqSlider.addEventListener('input', () => {
    viperIntensity = parseInt(viperEqSlider.value);
    if (viperEnabled && audioCtx) setEQActive(true);
  });

  // Nav filtering
  document.querySelectorAll('.viper-nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.viper-nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    });
  });

  // Filter chips
  document.querySelectorAll('.viper-filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.viper-filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });

  // Recent button
  document.getElementById('viperRecent').addEventListener('click', () => {
    // Show a small toast with recent effects (demo)
    showToast('最近使用: 3D 丽音, 演唱会, 超重低音');
  });
  function init() {
    setVolume(volume);
    buildPlaylist();

    if (songs.length > 0) {
      loadSong(0);
    } else {
      songTitle.textContent = '暂无歌曲';
      songArtist.textContent = '请将 MP3 文件放入音乐文件夹';
    }

    // Show playlist on desktop by default, hide on small screens
    if (window.innerWidth <= 820) {
      playlistVisible = false;
      playlist.classList.add('hidden');
    }

    // Pre-init AudioContext (stays suspended until user gesture)
    initAudioCtx();

    // Delay canvas sizing until layout is done
    requestAnimationFrame(() => {
      requestAnimationFrame(resizeCanvas);
    });
  }

  init();
})();
</script>
</body>
</html>
